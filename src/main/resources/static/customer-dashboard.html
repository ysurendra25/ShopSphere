<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Product Shop</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <!-- Header -->
    <header class="admin-header">
        <div class="header-container">
            <div class="logo">
                <h1>🛍️ Product Shop</h1>
            </div>
            <div class="header-actions">
                <div class="cart-icon-container">
                    <span class="cart-icon" id="cartIcon">🛒</span>
                    <span class="cart-count" id="cartCount">0</span>
                </div>
                <span class="user-info" id="userInfo">Welcome, Customer</span>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="main-container customer-layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar customer-sidebar">
            <nav class="nav-menu">
                <ul>
                    <li><a href="#" class="nav-link active" data-section="products">All Products</a></li>
                    <li><a href="#" class="nav-link" data-section="cart">Shopping Cart</a></li>
                </ul>
            </nav>
            <div class="cart-summary">
                <h3>Cart Summary</h3>
                <p>Items: <span id="summaryItems">0</span></p>
                <p>Total: ₹<span id="summaryTotal">0.00</span></p>
            </div>
        </aside>

        <!-- Content Area -->
        <main class="content">
            <!-- Products Section -->
            <section id="products" class="section active">
                <div class="section-header">
                    <h2>Available Products</h2>
                </div>
                <div class="search-bar">
                    <input type="text" id="searchInput" placeholder="Search products by name...">
                </div>
                <div class="products-container" id="productsContainer">
                    <p class="no-data">Loading products...</p>
                </div>
            </section>

            <!-- Cart Section -->
            <section id="cart" class="section">
                <div class="section-header">
                    <h2>Shopping Cart</h2>
                </div>
                <div class="cart-items" id="cartItems">
                    <p class="no-data">Your cart is empty. Start shopping!</p>
                </div>
                <div class="cart-footer" id="cartFooter" style="display: none;">
                    <div class="cart-total">
                        <h3>Order Summary</h3>
                        <h2>Total: &#8377;<span id="grandTotal">0.00</span></h2>
                    </div>
                    <div class="cart-actions">
                        <button class="blue-btn" id="checkoutBtn">Proceed to Checkout</button>
                        <button class="cancel-btn" onclick="clearCart()">Clear Cart</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal for Product Details -->
    <div id="productModal" class="modal">
        <div class="modal-content-large">
            <button class="modal-close" onclick="closeProductModal()">×</button>
            <div class="product-detail">
                <h3 id="modalProductName"></h3>
                <p id="modalProductDesc"></p>
                <p class="modal-price">Price: ₹<span id="modalPrice"></span></p>
                <p class="modal-stock">Available: <span id="modalStock"></span> units</p>
                <div class="quantity-selector">
                    <label for="quantityInput">Quantity:</label>
                    <input type="number" id="quantityInput" min="1" value="1">
                </div>
                <button class="blue-btn" onclick="addToCartFromModal()">Add to Cart</button>
            </div>
        </div>
    </div>

    <script src="/customer.js"></script>
</body>
</html>
