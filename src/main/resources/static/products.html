<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Management | JWT Demo</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="background"></div>
  <main class="layout">
    <section class="panel product-panel">
      <header class="brand">
        <h1>Product Management</h1>
        <p>Welcome, <span id="userInfo"></span> | <a href="#" id="logoutLink">Logout</a></p>
      </header>

      <div id="productAlert" class="alert" role="alert"></div>

      <div class="product-actions">
        <button id="addProductBtn" class="primary-btn">Add New Product</button>
        <button id="refreshBtn" class="secondary-btn">Refresh List</button>
      </div>

      <div id="productForm" class="product-form" style="display: none;">
        <h3 id="formTitle">Add Product</h3>
        <form id="productFormData">
          <input type="hidden" id="productId">
          <label for="productName">Name</label>
          <input id="productName" name="name" type="text" placeholder="Product name" required>
          <small class="field-error" id="productNameError"></small>

          <label for="productPrice">Price</label>
          <input id="productPrice" name="price" type="number" step="0.01" placeholder="Product price" required>
          <small class="field-error" id="productPriceError"></small>

          <label for="productDescription">Description</label>
          <textarea id="productDescription" name="description" placeholder="Product description" required></textarea>
          <small class="field-error" id="productDescriptionError"></small>

          <label for="productPhotoUrl">Photo URL</label>
          <input id="productPhotoUrl" name="photoUrl" type="url" placeholder="Photo URL">

          <div class="form-actions">
            <button type="submit" id="saveProductBtn" class="primary-btn">Save</button>
            <button type="button" id="cancelBtn" class="secondary-btn">Cancel</button>
          </div>
        </form>
      </div>

      <div id="productsList" class="products-list">
        <h3>Products</h3>
        <div id="productsContainer" class="products-container">
          <!-- Products will be loaded here -->
        </div>
      </div>
    </section>
  </main>
  <script src="/products.js"></script>
</body>
</html>
